name: Codex Security Fix

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      max_alerts:
        description: "Maximum open alerts per source to include"
        required: true
        default: "20"
      include_all_alerts:
        description: "Include all repository-wide alerts (ignores PR filtering)"
        type: boolean
        required: false
        default: false
      include_main_branch_codeql_alerts:
        description: "Also include open CodeQL alerts from main branch"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  codex-fix:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Initialize CodeQL
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          queries: security-extended

      - name: Autobuild for CodeQL
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        id: dependency_review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          warn-only: true

      - name: Fetch open security alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          EVENT_NAME: ${{ github.event_name }}
          MAX_ALERTS: ${{ github.event.inputs.max_alerts || 20 }}
          INCLUDE_ALL: ${{ github.event.inputs.include_all_alerts }}
          INCLUDE_MAIN_CODEQL: ${{ github.event.inputs.include_main_branch_codeql_alerts || vars.INCLUDE_MAIN_BRANCH_CODEQL_ALERTS || 'false' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_VULN_CHANGES: ${{ steps.dependency_review.outputs.vulnerable-changes }}
          PR_COMMENT_CONTENT: ${{ steps.dependency_review.outputs.comment-content }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" == "pull_request" ] && [ "${INCLUDE_ALL}" != "true" ]; then
            echo "$PR_VULN_CHANGES" > pr-vulnerable-changes.json
            echo "$PR_COMMENT_CONTENT" > pr-comment.md
            
            echo "[]" > all-dependabot-alerts.json
            echo "[]" > dependabot-alerts.json
            if ! [[ "${PR_HEAD_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "Invalid pull request head sha format" >&2
              exit 1
            fi
            PR_REF="${PR_HEAD_SHA}"
            # CodeQL results can appear shortly after analysis upload, so retry a few times.
            for i in 1 2 3; do
              gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${OWNER}/${REPO}/code-scanning/alerts?state=open&ref=${PR_REF}&tool_name=CodeQL&per_page=100" > all-code-scanning-alerts.json && break
              if [ "$i" -lt 3 ]; then sleep 10; fi
            done
            [ -f all-code-scanning-alerts.json ] || echo "[]" > all-code-scanning-alerts.json

            jq ".[0:(${MAX_ALERTS}|tonumber)]" all-code-scanning-alerts.json > pr-code-scanning-alerts.json

            if [ "${INCLUDE_MAIN_CODEQL}" = "true" ]; then
              MAIN_REF="refs/heads/main"
              gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${OWNER}/${REPO}/code-scanning/alerts?state=open&ref=${MAIN_REF}&tool_name=CodeQL&per_page=100" > main-code-scanning-alerts.json || echo "[]" > main-code-scanning-alerts.json
              jq -s '
                add
                | unique_by((.rule.id // "unknown") + "|" + (.most_recent_instance.location.path // ""))
                | .[0:('"${MAX_ALERTS}"'|tonumber)]
              ' pr-code-scanning-alerts.json main-code-scanning-alerts.json > code-scanning-alerts.json
            else
              cp pr-code-scanning-alerts.json code-scanning-alerts.json
            fi
            cp code-scanning-alerts.json all-code-scanning-alerts.json
            CODE_COUNT=$(jq 'length' code-scanning-alerts.json)
            echo '{"dependabot": [], "code_scanning": []}' > security-alerts.json
            jq -n \
              --slurpfile dependabot dependabot-alerts.json \
              --slurpfile code_scanning code-scanning-alerts.json \
              '{dependabot: $dependabot[0], code_scanning: $code_scanning[0]}' > security-alerts.json
            echo "count=${CODE_COUNT}" >> "$GITHUB_OUTPUT"
            echo "Skipping global alerts fetch for pull request. Found ${CODE_COUNT} CodeQL alerts (PR + optional main branch)."
            exit 0
          fi
          
          echo "[]" > pr-vulnerable-changes.json
          echo "" > pr-comment.md

          # Fetch Dependabot alerts
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO}/dependabot/alerts?state=open&per_page=100" > all-dependabot-alerts.json || echo "[]" > all-dependabot-alerts.json
          jq ".[0:(${MAX_ALERTS}|tonumber)]" all-dependabot-alerts.json > dependabot-alerts.json

          # Fetch Code Scanning alerts from main branch so non-PR runs can create remediation branches/PRs.
          MAIN_REF="refs/heads/main"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO}/code-scanning/alerts?state=open&ref=${MAIN_REF}&tool_name=CodeQL&per_page=100" > all-code-scanning-alerts.json || echo "[]" > all-code-scanning-alerts.json
          jq ".[0:(${MAX_ALERTS}|tonumber)]" all-code-scanning-alerts.json > code-scanning-alerts.json

          DEP_COUNT=$(jq 'length' dependabot-alerts.json)
          CODE_COUNT=$(jq 'length' code-scanning-alerts.json)
          TOTAL_COUNT=$((DEP_COUNT + CODE_COUNT))

          jq -n \
            --slurpfile dependabot dependabot-alerts.json \
            --slurpfile code_scanning code-scanning-alerts.json \
            '{dependabot: $dependabot[0], code_scanning: $code_scanning[0]}' > security-alerts.json

          echo "count=${TOTAL_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${DEP_COUNT} open Dependabot alerts and ${CODE_COUNT} open Code Scanning alerts"

      - name: Build Codex prompt
        if: steps.alerts.outputs.count != '0' || github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          cat > codex-prompt.txt <<'PROMPT'
          You are operating in a CI environment as a Security Reviewer.

          Task:
          1) Analyze the security alerts listed below.
          2) If this is a Pull Request, check the repo for any new vulnerabilities introduced in dependency files.
          3) Apply minimal, safe fixes to remediate vulnerabilities.
          4) For CodeQL alerts, prioritize direct source-code fixes in the reported files.
          5) Do not modify report/input artifact files unless needed for the final report.
          6) Write SECURITY_FIX_REPORT.md summarizing your actions.
          
          Security alerts JSON:
          PROMPT

          cat security-alerts.json >> codex-prompt.txt
          
          if [ -s pr-vulnerable-changes.json ]; then
            echo -e "\n\nNew PR Dependency Vulnerabilities:" >> codex-prompt.txt
            cat pr-vulnerable-changes.json >> codex-prompt.txt
          fi

      - name: Run Codex remediation
        if: steps.alerts.outputs.count != '0' || github.event_name == 'pull_request'
        uses: openai/codex-action@c25d10f3f498316d4b2496cc4c6dd58057a7b031 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY || secrets.CODEX_OPENAI_API_KEY }}
          prompt-file: codex-prompt.txt
          codex-args: '["--full-auto"]'

      - name: Commit and push fixes
        id: commit_push
        if: (steps.alerts.outputs.count != '0' || github.event_name == 'pull_request')
        run: |
          set -euo pipefail
          CHANGED_FILES="$(git diff --name-only)"
          if [ -z "${CHANGED_FILES}" ]; then
            echo "No changes created by Codex"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NON_ARTIFACT_CHANGES="$(printf '%s\n' "${CHANGED_FILES}" | grep -Ev '^(SECURITY_FIX_REPORT.md|pr-comment.md|codex-prompt.txt|security-alerts.json|dependabot-alerts.json|code-scanning-alerts.json|all-dependabot-alerts.json|all-code-scanning-alerts.json|pr-vulnerable-changes.json)$' || true)"
          if [ -z "${NON_ARTIFACT_CHANGES}" ]; then
            echo "Only report/input artifacts changed; skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(security): codex remediation for security alerts"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FIX_BRANCH="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
            if ! [[ "${FIX_BRANCH}" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "${FIX_BRANCH}" == -* ]] || [[ "${FIX_BRANCH}" == *".."* ]]; then
              echo "Unsafe pull request head ref: ${FIX_BRANCH}" >&2
              exit 1
            fi
            BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            git push origin "HEAD:${FIX_BRANCH}"
          else
            BASE_BRANCH="${{ github.ref_name }}"
            FIX_BRANCH="codex/security-fix-${GITHUB_RUN_ID}"
            git checkout -b "${FIX_BRANCH}"
            git push origin "HEAD:${FIX_BRANCH}"
          fi

          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "fix_branch=${FIX_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "base_branch=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Create remediation PR
        if: github.event_name != 'pull_request' && steps.commit_push.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          FIX_BRANCH: ${{ steps.commit_push.outputs.fix_branch }}
          BASE_BRANCH: ${{ steps.commit_push.outputs.base_branch }}
        run: |
          set -euo pipefail
          gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${FIX_BRANCH}" \
            --title "chore(security): Codex remediation for CodeQL/Dependabot alerts" \
            --body "Automated security remediation generated by Codex from current security alerts." \
          || echo "PR already exists or cannot be created automatically."

      - name: Post Codex Review
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          
          # Combine the Dependency Review scorecard and the Codex report
          if [ -s pr-comment.md ]; then
             cat pr-comment.md > COMBINED_REPORT.md
          else
             echo "## Dependency Review Scorecard" > COMBINED_REPORT.md
             echo "No dependency changes detected." >> COMBINED_REPORT.md
          fi

          if [ -f SECURITY_FIX_REPORT.md ]; then
             echo -e "\n\n---\n\n" >> COMBINED_REPORT.md
             cat SECURITY_FIX_REPORT.md >> COMBINED_REPORT.md
          fi
          
          echo "Adding bot as reviewer"
          gh pr edit "${PR_URL}" --add-reviewer "@me" || echo "Could not add reviewer (might already be one)"
          
          echo "Posting Combined report as a review comment to ${PR_URL}"
          gh pr review "${PR_URL}" --comment --body-file COMBINED_REPORT.md

      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-security-run
          path: |
            all-dependabot-alerts.json
            all-code-scanning-alerts.json
            pr-code-scanning-alerts.json
            main-code-scanning-alerts.json
            dependabot-alerts.json
            code-scanning-alerts.json
            security-alerts.json
            codex-prompt.txt
            SECURITY_FIX_REPORT.md
          if-no-files-found: ignore
