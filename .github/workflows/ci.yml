name: CI
on:
  workflow_call:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      run-semver-checks: true
      setup-script: |
        rm -f .cargo/config.toml
        ci/check_no_duplicate_canonical_wit.sh
        ci/check_no_component_wizard_usage.sh
        ci/check_no_greentic_interfaces_bindings_usage.sh

  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt, clippy
      - name: greentic-flow doctor --json smoke
        run: |
          cargo build --quiet --bin greentic-flow
          ./target/debug/greentic-flow doctor --json tests/data/flow_ok.ygtc | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data.get("ok") is True, data'
      - name: verify published schema $id
        run: |
          url="https://raw.githubusercontent.com/greenticai/greentic-flow/refs/heads/main/schemas/ygtc.flow.schema.json"
          curl -sSf "$url" -o /tmp/published-schema.json
          python3 - <<'PY'
          import json
          published = json.load(open("/tmp/published-schema.json"))
          local = json.load(open("schemas/ygtc.flow.schema.json"))
          if published.get("$id") != local.get("$id"):
              raise SystemExit(f"schema $id mismatch: remote={published.get('$id')} local={local.get('$id')}")
          PY
