name: Nightly Wizard E2E

permissions:
  contents: read
  packages: read

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  wizard-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Remove local cargo override config if present
        run: rm -f .cargo/config.toml
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          toolchain: 1.91.0
          override: true
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall
      - name: Install greentic-pack
        run: cargo binstall --no-confirm greentic-pack
      - name: Build greentic-flow
        run: cargo build --bin greentic-flow
      - name: Run nightly wizard e2e
        run: bash ci/nightly_wizard_e2e.sh
