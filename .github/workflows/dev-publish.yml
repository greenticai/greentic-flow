name: Dev CI & Tag (Flow)

on:
  push:
    branches: [ develop ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-test-tag:
    name: Build, Test & Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Enable dev overrides (develop only)
        run: |
          mkdir -p .cargo
          cp ci/dev-cargo-config.toml .cargo/config.toml

      - name: Commit dev overrides
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .cargo/config.toml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: enable dev overrides [skip ci]"
            # We don't push the commit to develop here to avoid triggering another workflow
            # But we want the tag to be on this commit.
          fi

      - name: Configure Git authentication
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Lint & Test
        run: |
          ci/check_interfaces_alignment.sh
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git tag "${tag}"
            git push origin "${tag}"
            
            # Now push the commit to develop as well
            git push origin HEAD:develop
          fi
