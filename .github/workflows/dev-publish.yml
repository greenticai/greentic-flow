name: Dev Publish crates

on:
  push:
    branches: [ develop ]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build-test:
    name: CI (lint/test/build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish-dev:
    name: Publish dev crate to CodeArtifact
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get CodeArtifact Token
        run: |
          token=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} \
            --region ${{ secrets.AWS_REGION }} \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV

      - name: Resolve latest greentic-types dev version
        shell: bash
        run: |
          set -euo pipefail
          version=$(
            aws codeartifact list-package-versions \
              --domain "${{ secrets.CODEARTIFACT_DOMAIN }}" \
              --domain-owner "${{ secrets.CODEARTIFACT_DOMAIN_OWNER }}" \
              --repository greentic \
              --format cargo \
              --package greentic-types \
              --region "${{ secrets.AWS_REGION }}" \
              --status Published \
              --output json | python3 -c "import json,re,sys; data=json.load(sys.stdin); versions=[((int(m.group(1)),int(m.group(2)),int(m.group(3)),int(m.group(4))), item['version']) for item in data.get('versions', []) for m in [re.fullmatch(r'(\\d+)\\.(\\d+)\\.(\\d+)-dev\\.(\\d+)', item.get('version', ''))] if m]; print(max(versions)[1] if versions else (_ for _ in ()).throw(SystemExit('no greentic-types dev versions found in CodeArtifact')))"
          )
          echo "Using greentic-types dev version: ${version}"
          echo "GREENTIC_TYPES_DEV_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Configure CodeArtifact Registry (via template)
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml

      - name: Apply CodeArtifact patches (via template)
        shell: bash
        run: |
          set -euo pipefail
          echo "" >> Cargo.toml
          sed "s/__GREENTIC_TYPES_DEV_VERSION__/${GREENTIC_TYPES_DEV_VERSION}/g" ci/cargo-patch-dev.toml >> Cargo.toml

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"
      - name: Determine dev version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Update package version to dev
        shell: bash
        run: |
          dev_version="${{ steps.gitversion.outputs.MajorMinorPatch }}-${{ steps.gitversion.outputs.PreReleaseTag }}"
          echo "Using dev version: ${dev_version}"
          # Update package version safely (first instance)
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml

      - name: Publish to CodeArtifact
        run: |
          # Use --allow-dirty because we edited Cargo.toml for patching/versioning
          cargo publish --registry corp-artifacts-greentic --allow-dirty

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi
