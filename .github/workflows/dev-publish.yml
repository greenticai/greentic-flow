name: Dev Publish crates

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    name: CI (lint/test/build)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Preload CI dependencies (PR to develop only)
        if: github.event_name == 'pull_request' && github.base_ref == 'develop' && github.actor != 'github-actions[bot]'
        run: cargo fetch --locked
      - name: Build Codex CI prompt (PR to develop only)
        if: github.event_name == 'pull_request' && github.base_ref == 'develop' && github.actor != 'github-actions[bot]'
        run: |
          cat > codex-ci-prompt.txt <<'PROMPT'
          You are fixing this pull request so CI lint/build/test passes.

          Primary goal:
          - Resolve recurring CI failures in dependency/build/lint/test steps before they execute.

          Commands that must pass after fixes:
          - Make minimal safe changes for:
            - cargo fmt --all -- --check
            - cargo clippy --workspace --all-targets -- -D warnings
            - cargo build --workspace --all-features
            - cargo test --workspace --all-features -- --nocapture

          Focus areas (high priority):
          - Cargo dependency/version conflicts.
          - Missing or stale Cargo.lock / lockfile drift issues.
          - Feature-flag mismatches used by clippy/build/test commands.
          - Broken imports, compile errors, warnings promoted to errors by clippy.
          - Build configuration issues that block compilation in CI.
          - Tooling/config mismatches in project files used by those commands.

          Allowed changes:
          - Source and configuration changes needed to make the above commands pass.
          - Dependency version adjustments and lockfile updates when required.

          Strict constraints:
          - DO NOT modify, delete, disable, or skip tests.
          - DO NOT change files under tests/**, src/tests/**, or any *.snap snapshots.
          - Do not relax assertions to force passing.
          - Do not weaken CI checks or remove failing checks.
          - If only test changes can solve an issue, leave code unchanged and report it.

          Output:
          - Create CODEX_CI_FIX_REPORT.md with what was changed and what remains.
          PROMPT
      - name: Codex CI auto-fix (PR to develop only)
        if: github.event_name == 'pull_request' && github.base_ref == 'develop' && github.actor != 'github-actions[bot]'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY || secrets.CODEX_OPENAI_API_KEY }}
          prompt-file: codex-ci-prompt.txt
          codex-args: '["--full-auto"]'
      - name: Guard: tests were not modified (PR to develop only)
        if: github.event_name == 'pull_request' && github.base_ref == 'develop' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only | grep -E '^(tests/|src/tests/)|(^|/).*\.snap$'; then
            echo "Codex changed test files/snapshots, which is forbidden."
            exit 1
          fi
      - name: Commit and push Codex fixes (PR to develop only)
        if: github.event_name == 'pull_request' && github.base_ref == 'develop' && github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if git diff --quiet && [ ! -f CODEX_CI_FIX_REPORT.md ]; then
            echo "No Codex changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(ci): codex pre-fix for lint/build/test" || echo "No changes to commit"
          git push origin "HEAD:${BRANCH}"

      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish-dev:
    name: Publish dev crate to CodeArtifact
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get CodeArtifact Token
        run: |
          token=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} \
            --region ${{ secrets.AWS_REGION }} \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV

      - name: Configure CodeArtifact Registry (via template)
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml

      - name: Apply ci patch
        run: printf '\n' >> Cargo.toml && cat ci/cargo-patch-dev.toml >> Cargo.toml

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: "6.x"
      - name: Determine dev version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        with:
          configFilePath: GitVersion.yml

      - name: Update package version to dev
        shell: bash
        run: |
          dev_version="${{ steps.gitversion.outputs.MajorMinorPatch }}-${{ steps.gitversion.outputs.PreReleaseTag }}"
          echo "Using dev version: ${dev_version}"
          # Update package version safely (first instance)
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml

      - name: Publish to CodeArtifact
        run: |
          # Use --allow-dirty because we edited Cargo.toml for patching/versioning
          cargo publish --registry corp-artifacts-greentic --allow-dirty

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi
