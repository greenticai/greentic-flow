name: Dev Publish crates

on:
  push:
    branches: [ develop ]
  workflow_dispatch: {}

jobs:
  build-test:
    name: CI (lint/test/build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          toolchain: 1.90.0
          override: true
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish-dev:
    name: Publish dev crate to Cloudsmith
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    env:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY || secrets.GH_PAT }}
      CARGO_REGISTRIES_CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_API_KEY || secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@v2

      - name: Configure Cloudsmith Registry (via template)
        run: |
          mkdir -p .cargo
          cp ci/cargo-config-dev.toml .cargo/config.toml

      - name: Apply Cloudsmith patches (via template)
        shell: bash
        run: |
          echo "" >> Cargo.toml
          # Append the patch template
          cat ci/cargo-patch-dev.toml >> Cargo.toml
          
          # Now, dynamically find the latest version for each patched crate
          # and inject it into the patch entries if needed.
          # We search for crates listed in the patch file.
          PATCHED_CRATES=$(grep -E '^[a-z0-9_-]+\s*=' ci/cargo-patch-dev.toml | cut -d '=' -f 1 | tr -d ' ')
          
          for crate in $PATCHED_CRATES; do
            echo "Searching for latest $crate in Cloudsmith..."
            VERSION=$(curl -s -H "X-Api-Key: $CLOUDSMITH_API_KEY" \
              "https://api.cloudsmith.io/v1/packages/dmytrogreen/dev/?q=name:$crate" \
              | jq -r 'if .[0] then .[0].version else empty end')
            
            if [ ! -z "$VERSION" ] && [ "$VERSION" != "null" ]; then
              echo "Injecting version $VERSION for $crate in patches"
              # Use sed to add the version to the patch entry
              sed -i "s/$crate\s*=\s*{\s*registry\s*=\s*\"cloudsmith\"\s*}/$crate = { version = \"$VERSION\", registry = \"cloudsmith\" }/" Cargo.toml
            fi
          done

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"
      - name: Determine dev version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Update package version to dev
        shell: bash
        run: |
          dev_version="${{ steps.gitversion.outputs.MajorMinorPatch }}-${{ steps.gitversion.outputs.PreReleaseTag }}"
          echo "Using dev version: ${dev_version}"
          # Update package version safely (first instance)
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml

      - name: Publish to Cloudsmith
        run: |
          # Use --allow-dirty because we edited Cargo.toml for patching/versioning
          cargo publish --registry cloudsmith --allow-dirty

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi
