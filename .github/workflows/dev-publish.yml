name: Dev Publish crates

on:
  push:
    branches: [ develop ]
  workflow_dispatch: {}

jobs:
  build-test:
    name: CI (lint/test/build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          toolchain: 1.90.0
          override: true
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint & Test
        run: |
          ci/check_interfaces_alignment.sh
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish-dev:
    name: Publish dev crate to Cloudsmith
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    env:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY || secrets.GH_PAT }}
      CARGO_REGISTRIES_CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_API_KEY || secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@v2

      - name: Configure Cloudsmith Registry
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [registries.cloudsmith]
          index = "sparse+https://cargo.cloudsmith.io/dmytrogreen/dev/"
          EOF

      - name: Apply Cloudsmith patches for internal dependencies
        shell: bash
        run: |
          echo "" >> Cargo.toml
          echo "[patch.crates-io]" >> Cargo.toml
          
          # List of internal crates to patch from Cloudsmith
          INTERNAL_CRATES=("greentic-types" "greentic-interfaces-host" "greentic-interfaces-wasmtime" "greentic-distributor-client" "greentic-qa-lib" "greentic-i18n-translator" "qa-spec")
          
          for crate in "${INTERNAL_CRATES[@]}"; do
            echo "Searching for latest $crate in Cloudsmith..."
            # Try to get the latest version from Cloudsmith API
            VERSION=$(curl -s -H "X-Api-Key: $CLOUDSMITH_API_KEY" \
              "https://api.cloudsmith.io/v1/packages/dmytrogreen/dev/?q=name:$crate" \
              | jq -r 'if .[0] then .[0].version else empty end')
            
            if [ ! -z "$VERSION" ] && [ "$VERSION" != "null" ]; then
              echo "Patching $crate to version $VERSION from Cloudsmith"
              echo "$crate = { version = \"$VERSION\", registry = \"cloudsmith\" }" >> Cargo.toml
            else
              echo "Warning: $crate not found in Cloudsmith dev repository, skipping patch."
            fi
          done

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"
      - name: Determine dev version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Update package version to dev
        shell: bash
        run: |
          dev_version="${{ steps.gitversion.outputs.MajorMinorPatch }}-${{ steps.gitversion.outputs.PreReleaseTag }}"
          echo "Using dev version: ${dev_version}"
          sed -i "s/^version = \".*\"/version = \"$dev_version\"/" Cargo.toml

      - name: Publish to Cloudsmith
        run: |
          # Use --allow-dirty because we edited Cargo.toml for patching/versioning
          cargo publish --registry cloudsmith --allow-dirty

      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.gitversion.outputs.FullSemVer }}"
          echo "Creating tag ${tag}"
          
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
          fi
