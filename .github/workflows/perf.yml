name: Perf (lightweight)
# Nightly-only. See plans/binary-bifurcation.md Phase A.8: push-trigger removed
# because post-merge perf runs were burning 15+ min without actionable signal.

on:
  schedule:
    - cron: "36 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt, clippy
      - name: Run perf guards
        run: cargo test --locked --all-features --test perf_scaling --test perf_timeout -- --nocapture
      - name: Run benchmarks (smoke)
        run: cargo bench --locked --bench perf -- --sample-size 10
