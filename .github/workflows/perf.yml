name: Perf (lightweight)
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A (heavy-job sweep). Manual runs remain via workflow_dispatch. push
# trigger preserved so main-merge still catches regressions immediately.

on:
  schedule:
    - cron: "10 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt, clippy
      - name: Run perf guards
        run: cargo test --locked --all-features --test perf_scaling --test perf_timeout -- --nocapture
      - name: Run benchmarks (smoke)
        run: cargo bench --locked --bench perf -- --sample-size 10
